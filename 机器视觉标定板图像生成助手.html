<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>机器视觉标定板图像生成助手</title>
<style>
  /* ============================================================
     1. CSS Variables
     ============================================================ */
  :root {
    --color-bg: #0a0e27;
    --color-surface: #111827;
    --color-surface-2: #1a1d35;
    --color-border: #1f2544;
    --color-primary: #00d4ff;
    --color-secondary: #0ea5e9;
    --color-accent: #3b82f6;
    --color-success: #22c55e;
    --color-warning: #f59e0b;
    --color-danger: #ef4444;
    --color-text: #e5e7eb;
    --color-text-dim: #9ca3af;
    --color-text-muted: #6b7280;
    --radius-sm: 4px;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    --shadow-glow: 0 0 20px rgba(0, 212, 255, 0.15);
    --spacing-xs: 4px;
    --spacing-sm: 8px;
    --spacing: 12px;
    --spacing-md: 16px;
    --spacing-lg: 24px;
    --font-mono: ui-monospace, "SF Mono", Consolas, "Courier New", monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", sans-serif;
  }

  /* ============================================================
     2. Reset
     ============================================================ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; }
  input, select { font-family: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }

  /* ============================================================
     3. Layout
     ============================================================ */
  .app {
    display: grid;
    grid-template-rows: 56px 1fr 32px;
    height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--spacing-lg);
    background: linear-gradient(90deg, var(--color-surface) 0%, var(--color-surface-2) 100%);
    border-bottom: 1px solid var(--color-border);
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: var(--spacing-md); }
  .logo {
    width: 36px; height: 36px;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #001018; font-size: 12px;
    letter-spacing: 0.5px;
    box-shadow: var(--shadow-glow);
  }
  .header-title { display: flex; flex-direction: column; }
  .header-title .app-name { font-weight: 600; font-size: 15px; color: var(--color-text); }
  .header-title .app-slogan { font-size: 11px; color: var(--color-text-dim); }
  .header-right { display: flex; gap: var(--spacing-sm); align-items: center; }
  .company { font-size: 12px; color: var(--color-text-dim); margin-right: var(--spacing); }

  .main {
    display: grid;
    grid-template-columns: 320px 1fr 300px;
    overflow: hidden;
  }
  .panel {
    background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    overflow-y: auto;
    padding: var(--spacing-md);
  }
  .panel-right {
    border-right: none;
    border-left: 1px solid var(--color-border);
  }
  .preview-area {
    background: #0f1330;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .preview-toolbar {
    display: flex;
    gap: var(--spacing-sm);
    padding: var(--spacing-sm) var(--spacing-md);
    background: var(--color-surface-2);
    border-bottom: 1px solid var(--color-border);
    align-items: center;
    flex-wrap: wrap;
  }
  .preview-toolbar .spacer { flex: 1; }
  .preview-canvas {
    flex: 1;
    overflow: auto;
    padding: var(--spacing-lg);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background:
      linear-gradient(45deg, #0c1028 25%, transparent 25%),
      linear-gradient(-45deg, #0c1028 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #0c1028 75%),
      linear-gradient(-45deg, transparent 75%, #0c1028 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  }
  .svg-wrapper {
    background: #fff;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transition: transform 0.2s ease;
    transform-origin: top center;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 var(--spacing-lg);
    font-size: 11px;
    color: var(--color-text-muted);
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
  }

  /* ============================================================
     4. Brand Components
     ============================================================ */
  .brand-card {
    background: linear-gradient(135deg, var(--color-surface-2), var(--color-surface));
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: var(--spacing-md);
    margin-bottom: var(--spacing-md);
    text-align: center;
  }
  .brand-card .brand-logo {
    width: 48px; height: 48px;
    margin: 0 auto var(--spacing-sm);
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #001018;
  }
  .brand-card .brand-company { font-size: 13px; font-weight: 600; color: var(--color-text); }
  .brand-card .brand-slogan { font-size: 11px; color: var(--color-text-dim); margin-top: 2px; }
  .brand-qr {
    width: 120px; height: 120px;
    margin: var(--spacing) auto;
    border-radius: var(--radius-sm);
    background: #fff;
    padding: 6px;
    display: block;
  }
  .brand-info-line {
    font-size: 11px;
    color: var(--color-text-dim);
    margin-top: 4px;
  }
  .brand-info-line strong { color: var(--color-text); margin-right: 4px; }

  /* ============================================================
     5. Tool Components
     ============================================================ */
  .section {
    margin-bottom: var(--spacing-md);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    background: var(--color-surface-2);
    overflow: hidden;
  }
  .section-title {
    padding: 10px var(--spacing);
    font-size: 12px;
    font-weight: 600;
    color: var(--color-primary);
    background: rgba(0, 212, 255, 0.06);
    border-bottom: 1px solid var(--color-border);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .section-title::before {
    content: ""; width: 3px; height: 12px;
    background: var(--color-primary); border-radius: 2px;
  }
  .section-body {
    padding: var(--spacing);
    display: grid;
    gap: var(--spacing-sm);
  }
  .field {
    display: grid;
    grid-template-columns: 1fr;
    gap: 4px;
  }
  .field label {
    font-size: 11px;
    color: var(--color-text-dim);
  }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-sm);
  }
  .input, .select {
    width: 100%;
    padding: 7px 10px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    color: var(--color-text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input:focus, .select:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.15);
  }
  .input[type="color"] { padding: 2px; height: 32px; cursor: pointer; }
  .checkbox {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--color-text);
    cursor: pointer;
  }
  .checkbox input { accent-color: var(--color-primary); }

  .btn {
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    background: var(--color-surface-2);
    color: var(--color-text);
    border: 1px solid var(--color-border);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
  .btn-primary {
    background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
    color: #001018;
    border: none;
    font-weight: 600;
  }
  .btn-primary:hover { filter: brightness(1.1); color: #001018; }
  .btn-ghost { background: transparent; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  .tab-group {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
    background: var(--color-surface);
    padding: 3px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--color-border);
  }
  .tab {
    padding: 7px 8px;
    font-size: 12px;
    text-align: center;
    border-radius: 3px;
    color: var(--color-text-dim);
    transition: all 0.15s;
    cursor: pointer;
    user-select: none;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
    color: #001018;
    font-weight: 600;
  }

  /* Info panel (right) */
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px dashed var(--color-border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .k { color: var(--color-text-dim); }
  .info-row .v { color: var(--color-text); font-family: var(--font-mono); }
  .info-row .v.success { color: var(--color-success); }
  .info-row .v.warning { color: var(--color-warning); }
  .info-row .v.danger { color: var(--color-danger); }

  .tip {
    font-size: 11px;
    color: var(--color-warning);
    background: rgba(245, 158, 11, 0.08);
    border-left: 3px solid var(--color-warning);
    padding: 8px 10px;
    border-radius: 3px;
    line-height: 1.6;
  }
  .tip.info {
    color: var(--color-primary);
    background: rgba(0, 212, 255, 0.06);
    border-left-color: var(--color-primary);
  }

  /* Toast */
  .toast-container {
    position: fixed;
    top: 72px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
  }
  .toast {
    background: var(--color-surface-2);
    border: 1px solid var(--color-border);
    border-left-width: 4px;
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--color-text);
    box-shadow: var(--shadow);
    min-width: 240px;
    animation: slideIn 0.25s ease;
  }
  .toast.success { border-left-color: var(--color-success); }
  .toast.warning { border-left-color: var(--color-warning); }
  .toast.error { border-left-color: var(--color-danger); }
  .toast.info { border-left-color: var(--color-primary); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ============================================================
     7. Responsive
     ============================================================ */
  @media (max-width: 1280px) {
    .main { grid-template-columns: 300px 1fr 260px; }
  }
  @media (max-width: 1023px) {
    body { overflow: auto; }
    .app { height: auto; grid-template-rows: auto auto auto; }
    .main {
      grid-template-columns: 1fr;
      height: auto;
    }
    .panel, .panel-right {
      border-right: none;
      border-left: none;
      border-bottom: 1px solid var(--color-border);
      max-height: none;
    }
    .preview-canvas { min-height: 60vh; }
  }
  @media (max-width: 767px) {
    .header { padding: 0 var(--spacing); }
    .company { display: none; }
    .header-title .app-slogan { display: none; }
    .preview-toolbar { font-size: 11px; }
    .preview-toolbar .btn { padding: 6px 8px; font-size: 11px; }
  }

  /* Print-only styles (PDF export via browser) */
  @media print {
    @page { margin: 0; }
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
    }
    #printArea svg {
      display: block;
    }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- ================= Header ================= -->
    <header class="header no-print">
      <div class="header-left">
        <div class="logo" data-brand="logoText">LOGO</div>
        <div class="header-title">
          <div class="app-name">机器视觉标定板图像生成助手</div>
          <div class="app-slogan" data-brand="slogan">品牌标语</div>
        </div>
      </div>
      <div class="header-right">
        <span class="company" data-brand="companyName">公司名称</span>
        <button class="btn btn-sm" id="btnImport">导入配置</button>
        <button class="btn btn-sm" id="btnExportJSON">导出配置</button>
        <button class="btn btn-sm btn-primary" id="btnPrint">打印 / PDF</button>
      </div>
    </header>

    <!-- ================= Main ================= -->
    <div class="main">
      <!-- ============ Left Panel: Parameters ============ -->
      <aside class="panel no-print">
        <div class="section">
          <div class="section-title">标定板类型</div>
          <div class="section-body">
            <div class="tab-group" id="tabGroup">
              <div class="tab active" data-type="checker">棋盘格</div>
              <div class="tab" data-type="dots">圆点阵列</div>
              <div class="tab" data-type="checkerQR">二维码棋盘</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">尺寸与单位</div>
          <div class="section-body">
            <div class="field">
              <label>单位</label>
              <select class="select" id="inpUnit">
                <option value="mm" selected>毫米 (mm)</option>
                <option value="cm">厘米 (cm)</option>
                <option value="inch">英寸 (inch)</option>
              </select>
            </div>
            <div class="field-row">
              <div class="field">
                <label>列数 (X)</label>
                <input class="input" type="number" id="inpCols" min="2" max="200" value="10" />
              </div>
              <div class="field">
                <label>行数 (Y)</label>
                <input class="input" type="number" id="inpRows" min="2" max="200" value="7" />
              </div>
            </div>

            <!-- 棋盘格 / 二维码棋盘 专用 -->
            <div id="groupChecker">
              <div class="field-row">
                <div class="field">
                  <label>单格宽度</label>
                  <input class="input" type="number" id="inpCellW" min="0.1" step="0.1" value="20" />
                </div>
                <div class="field">
                  <label>单格高度</label>
                  <input class="input" type="number" id="inpCellH" min="0.1" step="0.1" value="20" />
                </div>
              </div>
              <label class="checkbox">
                <input type="checkbox" id="inpSquareLock" checked />
                锁定正方形格子
              </label>
            </div>

            <!-- 圆点 专用 -->
            <div id="groupDots" style="display:none;">
              <div class="field-row">
                <div class="field">
                  <label>圆点直径</label>
                  <input class="input" type="number" id="inpDotD" min="0.1" step="0.1" value="10" />
                </div>
                <div class="field">
                  <label>排列方式</label>
                  <select class="select" id="inpDotPattern">
                    <option value="grid">正交</option>
                    <option value="staggered">交错</option>
                    <option value="asymmetric">非对称</option>
                  </select>
                </div>
              </div>
              <div class="field-row">
                <div class="field">
                  <label>中心距 X</label>
                  <input class="input" type="number" id="inpSpacingX" min="0.1" step="0.1" value="25" />
                </div>
                <div class="field">
                  <label>中心距 Y</label>
                  <input class="input" type="number" id="inpSpacingY" min="0.1" step="0.1" value="25" />
                </div>
              </div>
            </div>

            <div class="field-row">
              <div class="field">
                <label>水平边距</label>
                <input class="input" type="number" id="inpMarginX" min="0" step="0.5" value="10" />
              </div>
              <div class="field">
                <label>垂直边距</label>
                <input class="input" type="number" id="inpMarginY" min="0" step="0.5" value="10" />
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">颜色与样式</div>
          <div class="section-body">
            <div class="field-row">
              <div class="field">
                <label>前景色</label>
                <input class="input" type="color" id="inpFg" value="#000000" />
              </div>
              <div class="field">
                <label>背景色</label>
                <input class="input" type="color" id="inpBg" value="#ffffff" />
              </div>
            </div>
            <label class="checkbox">
              <input type="checkbox" id="inpShowBorder" />
              显示外边框
            </label>
            <label class="checkbox">
              <input type="checkbox" id="inpShowRuler" checked />
              显示打印校准尺
            </label>
            <label class="checkbox">
              <input type="checkbox" id="inpShowLabel" checked />
              显示尺寸标注
            </label>
          </div>
        </div>

        <div class="section" id="sectionQR">
          <div class="section-title">二维码配置</div>
          <div class="section-body">
            <label class="checkbox">
              <input type="checkbox" id="inpQrEnabled" />
              启用二维码 (仅“二维码棋盘”)
            </label>
            <div class="field">
              <label>分布方式</label>
              <select class="select" id="inpQrLayout">
                <option value="corners">四角分布</option>
                <option value="edges">边缘分布</option>
                <option value="interval">网格间隔</option>
                <option value="all">全部白格</option>
              </select>
            </div>
            <div class="field-row">
              <div class="field">
                <label>间隔 (格)</label>
                <input class="input" type="number" id="inpQrInterval" min="1" value="3" />
              </div>
              <div class="field">
                <label>占用格数</label>
                <select class="select" id="inpQrSize">
                  <option value="1">1 × 1</option>
                  <option value="2" selected>2 × 2</option>
                  <option value="3">3 × 3</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>内容格式</label>
              <select class="select" id="inpQrFormat">
                <option value="simple">简洁: X=3,Y=5</option>
                <option value="dash">代码: CB-3-5</option>
                <option value="industrial">工业: BOARD=...;X=3;Y=5</option>
                <option value="json">JSON</option>
              </select>
            </div>
            <div class="field">
              <label>容错等级</label>
              <select class="select" id="inpQrEc">
                <option value="L">L (7%)</option>
                <option value="M" selected>M (15%)</option>
                <option value="Q">Q (25%)</option>
                <option value="H">H (30%)</option>
              </select>
            </div>
            <label class="checkbox">
              <input type="checkbox" id="inpQrShowCoord" />
              在二维码下方显示坐标
            </label>
          </div>
        </div>

        <div class="section">
          <div class="section-title">纸张与打印</div>
          <div class="section-body">
            <div class="field">
              <label>纸张尺寸</label>
              <select class="select" id="inpPaper">
                <option value="A4">A4 (210 × 297 mm)</option>
                <option value="A3">A3 (297 × 420 mm)</option>
                <option value="A2">A2 (420 × 594 mm)</option>
                <option value="Letter">Letter (216 × 279 mm)</option>
                <option value="custom">自定义</option>
              </select>
            </div>
            <div class="field">
              <label>方向</label>
              <select class="select" id="inpOrientation">
                <option value="auto" selected>自动</option>
                <option value="portrait">纵向</option>
                <option value="landscape">横向</option>
              </select>
            </div>
            <div id="groupCustomPaper" style="display:none;">
              <div class="field-row">
                <div class="field">
                  <label>纸张宽 (mm)</label>
                  <input class="input" type="number" id="inpPaperW" value="210" />
                </div>
                <div class="field">
                  <label>纸张高 (mm)</label>
                  <input class="input" type="number" id="inpPaperH" value="297" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- ============ Center: Preview ============ -->
      <section class="preview-area">
        <div class="preview-toolbar no-print">
          <button class="btn btn-sm" id="btnZoomOut">−</button>
          <span id="zoomLabel" style="font-family:var(--font-mono); font-size:12px; min-width:56px; text-align:center;">100%</span>
          <button class="btn btn-sm" id="btnZoomIn">+</button>
          <button class="btn btn-sm" id="btnZoomFit">适应</button>
          <button class="btn btn-sm" id="btnZoomReal">1:1</button>
          <div class="spacer"></div>
          <button class="btn btn-sm" id="btnExportSVG">导出 SVG</button>
          <button class="btn btn-sm" id="btnExportPNG">导出 PNG</button>
          <button class="btn btn-sm btn-primary" id="btnExportPDF">导出 PDF</button>
        </div>
        <div class="preview-canvas" id="previewCanvas">
          <div class="svg-wrapper" id="svgWrapper"></div>
        </div>
      </section>

      <!-- ============ Right: Info & Brand ============ -->
      <aside class="panel panel-right no-print">
        <div class="section">

const UtilsModule = {
  /** 单位转 mm */
  toMm(value, unit) {
    value = Number(value) || 0;
    switch (unit) {
      case "mm":   return value;
      case "cm":   return value * 10;
      case "inch": return value * 25.4;
      default:     return value;
    }
  },
  /** mm 转 px (以 96 DPI 作为屏幕基准换算；SVG viewBox 单位为 mm) */
  mmToPx(mm) { return mm * 96 / 25.4; },
  /** 防抖 */
  debounce(fn, wait) {
    let t = null;
    return function () {
      clearTimeout(t);
      const args = arguments, ctx = this;
      t = setTimeout(() => fn.apply(ctx, args), wait);
    };
  },
  /** 数字格式化 */
  fmt(n, digits = 2) {
    if (!isFinite(n)) return "--";
    return Number(n).toFixed(digits);
  },
  /** 下载 Blob */
  downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 200);
  },
  /** LocalStorage */
  storageGet(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch (e) { return fallback; }
  },
  storageSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  },
  /** HTML 转义 */
  escape(str) {
    return String(str).replace(/[&<>"']/g, s => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[s]));
  }
};

/**
 * BrandModule: 品牌信息渲染
 * 所有品牌信息必须从 CONFIG.brand 读取，禁止在 DOM 中硬编码。
 */
const BrandModule = {
  render() {
    const b = CONFIG.brand;
    document.querySelectorAll("[data-brand='companyName']").forEach(el => el.textContent = b.companyName);
    document.querySelectorAll("[data-brand='author']").forEach(el => el.textContent = b.author);
    document.querySelectorAll("[data-brand='officialAccount']").forEach(el => el.textContent = b.officialAccount);
    document.querySelectorAll("[data-brand='contact']").forEach(el => el.textContent = b.contact);
    document.querySelectorAll("[data-brand='slogan']").forEach(el => el.textContent = b.slogan);
    document.querySelectorAll("[data-brand='logoText']").forEach(el => el.textContent = b.logoText);
    document.querySelectorAll("[data-brand='copyright']").forEach(el => el.textContent = b.copyright);
    document.querySelectorAll("[data-brand='qrcode']").forEach(el => { el.src = b.qrcodeBase64; });
    document.title = CONFIG.app.name;
    const v = document.getElementById("appVersion");
    if (v) v.textContent = CONFIG.app.version;
  }
};

/**
 * UIModule: 界面交互
 */
const UIModule = {
  state: {
    type: "checker",     // checker | dots | checkerQR
    zoom: 1,
    lastParams: null
  },
  cache: {},

  cacheDom() {
    const ids = [
      "tabGroup", "inpUnit", "inpCols", "inpRows",
      "inpCellW", "inpCellH", "inpSquareLock",
      "inpDotD", "inpSpacingX", "inpSpacingY", "inpDotPattern",
      "inpMarginX", "inpMarginY",
      "inpFg", "inpBg", "inpShowBorder", "inpShowRuler", "inpShowLabel",
      "inpQrEnabled", "inpQrLayout", "inpQrInterval", "inpQrSize",
      "inpQrFormat", "inpQrEc", "inpQrShowCoord",
      "inpPaper", "inpOrientation", "inpPaperW", "inpPaperH",
      "groupChecker", "groupDots", "groupCustomPaper", "sectionQR",
      "svgWrapper", "previewCanvas", "zoomLabel",
      "infoBodyW", "infoBodyH", "infoTotalW", "infoTotalH",
      "infoPaper", "infoFit",
      "btnZoomIn", "btnZoomOut", "btnZoomFit", "btnZoomReal",
      "btnExportSVG", "btnExportPNG", "btnExportPDF",
      "btnPrint", "btnImport", "btnExportJSON",
      "fileInput", "toastContainer", "printArea"
    ];
    ids.forEach(id => this.cache[id] = document.getElementById(id));
  },

  bind() {
    const c = this.cache;
    const update = UtilsModule.debounce(() => CoreModule.generate(), 60);

    // Tab 切换
    c.tabGroup.addEventListener("click", (e) => {
      const tab = e.target.closest(".tab");
      if (!tab) return;
      c.tabGroup.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      this.state.type = tab.dataset.type;
      this.syncTypeGroups();
      update();
    });

    // 所有输入监听
    const allInputs = document.querySelectorAll(".panel input, .panel select");
    allInputs.forEach(el => {
      el.addEventListener("input", () => {
        // 正方形锁定
        if (el === c.inpCellW && c.inpSquareLock.checked) c.inpCellH.value = c.inpCellW.value;
        if (el === c.inpCellH && c.inpSquareLock.checked) c.inpCellW.value = c.inpCellH.value;
        // 自定义纸张显示
        if (el === c.inpPaper) {
          c.groupCustomPaper.style.display = el.value === "custom" ? "" : "none";
        }
        update();
      });
      el.addEventListener("change", update);
    });

    // 缩放控制
    c.btnZoomIn.addEventListener("click", () => this.zoom(this.state.zoom * 1.2));
    c.btnZoomOut.addEventListener("click", () => this.zoom(this.state.zoom / 1.2));
    c.btnZoomReal.addEventListener("click", () => this.zoom(1));
    c.btnZoomFit.addEventListener("click", () => this.zoomFit());

    // 导出按钮
    c.btnExportSVG.addEventListener("click", () => CoreModule.exportSVG());
    c.btnExportPNG.addEventListener("click", () => CoreModule.exportPNG());
    c.btnExportPDF.addEventListener("click", () => CoreModule.exportPDF());
    c.btnPrint.addEventListener("click", () => CoreModule.exportPDF());
    c.btnExportJSON.addEventListener("click", () => CoreModule.exportConfigJSON());
    c.btnImport.addEventListener("click", () => c.fileInput.click());
    c.fileInput.addEventListener("change", (e) => CoreModule.importConfigJSON(e.target.files[0]));

    // 键盘快捷键
    window.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "p") {
        e.preventDefault();
        CoreModule.exportPDF();
      }
    });

    // 初始化分组显示
    this.syncTypeGroups();
  },

  syncTypeGroups() {
    const t = this.state.type;
    this.cache.groupChecker.style.display = (t === "checker" || t === "checkerQR") ? "" : "none";
    this.cache.groupDots.style.display    = (t === "dots") ? "" : "none";
    this.cache.sectionQR.style.display    = (t === "checkerQR") ? "" : "none";
    // 自动启用二维码
    if (t === "checkerQR" && !this.cache.inpQrEnabled.checked) {
      this.cache.inpQrEnabled.checked = true;
    }
    if (t !== "checkerQR") {
      this.cache.inpQrEnabled.checked = false;
    }
  },

  zoom(v) {
    v = Math.max(0.1, Math.min(8, v));
    this.state.zoom = v;
    this.cache.svgWrapper.style.transform = `scale(${v})`;
    this.cache.zoomLabel.textContent = Math.round(v * 100) + "%";
  },

  zoomFit() {
    const svg = this.cache.svgWrapper.firstElementChild;
    if (!svg) return;
    const canvas = this.cache.previewCanvas;
    const pad = 40;
    const availW = canvas.clientWidth - pad;
    const availH = canvas.clientHeight - pad;
    const w = svg.getBoundingClientRect().width / this.state.zoom;
    const h = svg.getBoundingClientRect().height / this.state.zoom;
    if (w <= 0 || h <= 0) return;
    const fit = Math.min(availW / w, availH / h);
    this.zoom(fit);
  },

  updateInfo(info) {
    const c = this.cache;
    c.infoBodyW.textContent  = UtilsModule.fmt(info.bodyW) + " mm";
    c.infoBodyH.textContent  = UtilsModule.fmt(info.bodyH) + " mm";
    c.infoTotalW.textContent = UtilsModule.fmt(info.totalW) + " mm";
    c.infoTotalH.textContent = UtilsModule.fmt(info.totalH) + " mm";
    c.infoPaper.textContent  = info.paperLabel;

    c.infoFit.classList.remove("success", "warning", "danger");
    if (info.fitStatus === "ok") {
      c.infoFit.classList.add("success");
      c.infoFit.textContent = "适合所选纸张";
    } else if (info.fitStatus === "warn") {
      c.infoFit.classList.add("warning");
      c.infoFit.textContent = "接近纸张边界";
    } else {
      c.infoFit.classList.add("danger");
      c.infoFit.textContent = "超出纸张范围";
    }
  },

  toast(msg, type = "info", ms = 2600) {
    const t = document.createElement("div");
    t.className = "toast " + type;
    t.textContent = msg;
    this.cache.toastContainer.appendChild(t);
    setTimeout(() => {
      t.style.transition = "opacity .3s, transform .3s";
      t.style.opacity = "0";
      t.style.transform = "translateX(20px)";
      setTimeout(() => t.remove(), 320);
    }, ms);
  }
};

/**
 * CoreModule: 核心业务 — 生成 SVG / 导出
 */
const CoreModule = {
  /** 收集当前输入参数（统一转为 mm）*/
  collectParams() {
    const c = UIModule.cache;
    const unit = c.inpUnit.value;
    const mm = v => UtilsModule.toMm(v, unit);

    let paperSize;
    if (c.inpPaper.value === "custom") {
      paperSize = { w: Number(c.inpPaperW.value) || 210, h: Number(c.inpPaperH.value) || 297 };
    } else {
      paperSize = { ...CONFIG.paperSize[c.inpPaper.value] };
    }

    return {
      type: UIModule.state.type,
      unit,
      cols: Math.max(2, parseInt(c.inpCols.value) || 2),
      rows: Math.max(2, parseInt(c.inpRows.value) || 2),
      cellW: mm(c.inpCellW.value),
      cellH: mm(c.inpCellH.value),
      dotD: mm(c.inpDotD.value),
      spacingX: mm(c.inpSpacingX.value),
      spacingY: mm(c.inpSpacingY.value),
      dotPattern: c.inpDotPattern.value,
      marginX: mm(c.inpMarginX.value),
      marginY: mm(c.inpMarginY.value),
      fg: c.inpFg.value,
      bg: c.inpBg.value,
      showBorder: c.inpShowBorder.checked,
      showRuler: c.inpShowRuler.checked,
      showLabel: c.inpShowLabel.checked,
      qrEnabled: c.inpQrEnabled.checked,
      qrLayout: c.inpQrLayout.value,
      qrInterval: Math.max(1, parseInt(c.inpQrInterval.value) || 3),
      qrSize: Math.max(1, parseInt(c.inpQrSize.value) || 2),
      qrFormat: c.inpQrFormat.value,
      qrEc: c.inpQrEc.value,
      qrShowCoord: c.inpQrShowCoord.checked,
      paperName: c.inpPaper.value,
      paperSize,
      orientation: c.inpOrientation.value
    };
  },

  /** 校验参数 */
  validate(p) {
    if (p.cols < 2 || p.rows < 2) return "行数和列数必须不小于 2";
    if (p.type === "dots") {
      if (p.dotD <= 0) return "圆点直径必须大于 0";
      if (p.spacingX <= p.dotD || p.spacingY <= p.dotD)
        return "圆点中心距必须大于圆点直径，否则圆点会重叠";
    } else {
      if (p.cellW <= 0 || p.cellH <= 0) return "单格尺寸必须大于 0";
    }
    if (p.marginX < 0 || p.marginY < 0) return "边距不能为负数";
    return null;
  },

  /** 计算主体尺寸 */
  computeSize(p) {
    let bodyW, bodyH;
    if (p.type === "dots") {
      if (p.dotPattern === "staggered") {
        bodyW = (p.cols - 1) * p.spacingX + p.dotD + p.spacingX / 2;
      } else if (p.dotPattern === "asymmetric") {
        bodyW = (p.cols - 1) * p.spacingX + p.dotD + p.spacingX / 2;
      } else {
        bodyW = (p.cols - 1) * p.spacingX + p.dotD;
      }
      bodyH = (p.rows - 1) * p.spacingY + p.dotD;
    } else {
      bodyW = p.cols * p.cellW;
      bodyH = p.rows * p.cellH;
    }
    const totalW = bodyW + p.marginX * 2;
    const totalH = bodyH + p.marginY * 2;
    return { bodyW, bodyH, totalW, totalH };
  },

  /** 决定纸张方向 */
  resolvePaper(p, totalW, totalH) {
    let { w, h } = p.paperSize;
    let orient = p.orientation;
    if (orient === "auto") {
      orient = (totalW > totalH) ? "landscape" : "portrait";
    }
    if (orient === "landscape" && w < h) [w, h] = [h, w];
    if (orient === "portrait"  && w > h) [w, h] = [h, w];
    return { w, h, orient };
  },

  /** 判断适配状态 */
  fitStatus(totalW, totalH, paperW, paperH) {
    const tolerance = 4; // mm
    if (totalW > paperW || totalH > paperH) return "over";
    if (totalW > paperW - tolerance || totalH > paperH - tolerance) return "warn";
    return "ok";
  },

  /** 生成二维码内容字符串 */
  qrContent(col, row, p) {
    switch (p.qrFormat) {
      case "dash":       return `CB-${col}-${row}`;
      case "industrial": return `BOARD=CALIB001;TYPE=CHECKER;X=${col};Y=${row};UNIT=${p.unit.toUpperCase()}`;
      case "json":       return JSON.stringify({ type: "checkerboard", x: col, y: row, unit: p.unit });
      case "simple":
      default:           return `X=${col},Y=${row}`;
    }
  },

  /** 计算二维码放置位置列表（左上角棋盘格坐标）*/
  qrPositions(p) {
    const positions = [];
    const size = p.qrSize;
    const maxC = p.cols - size;
    const maxR = p.rows - size;
    if (maxC < 0 || maxR < 0) return positions;

    switch (p.qrLayout) {
      case "corners":
        positions.push([0, 0]);
        positions.push([maxC, 0]);
        positions.push([0, maxR]);
        positions.push([maxC, maxR]);
        break;
      case "edges": {
        const step = Math.max(size + 1, Math.floor(p.cols / 4));
        for (let x = 0; x <= maxC; x += step) {
          positions.push([x, 0]);
          positions.push([x, maxR]);
        }
        const stepY = Math.max(size + 1, Math.floor(p.rows / 4));
        for (let y = stepY; y < maxR; y += stepY) {
          positions.push([0, y]);
          positions.push([maxC, y]);
        }
        break;
      }
      case "interval": {
        const iv = Math.max(size, p.qrInterval);
        for (let y = 0; y <= maxR; y += iv) {
          for (let x = 0; x <= maxC; x += iv) {
            positions.push([x, y]);
          }
        }
        break;
      }
      case "all": {
        // 只放在白色格上（左上为黑，白格条件：(r+c)%2===1）
        for (let y = 0; y <= maxR; y++) {
          for (let x = 0; x <= maxC; x++) {
            if (size === 1 && (x + y) % 2 !== 1) continue;
            positions.push([x, y]);
          }
        }
        break;
      }
    }

    // 去重
    const seen = new Set();
    return positions.filter(([x, y]) => {
      const k = x + "," + y;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });
  },

  /** 生成 QR 的 SVG 片段（方格形式）
   *  返回 { svgMarkup, modules } */
  qrSvg(text, sizeMm, level, fg, bg, xOffset, yOffset) {
    try {
      const qr = QRCodeLib.create(text, level);
      const n = qr.getModuleCount();
      const mod = sizeMm / n;
      // 白底
      let s = `<rect x="${xOffset}" y="${yOffset}" width="${sizeMm}" height="${sizeMm}" fill="${bg}"/>`;
      // 用 path 合并所有黑色模块，减少节点数
      let d = "";
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          if (qr.isDark(r, c)) {
            const x = xOffset + c * mod;
            const y = yOffset + r * mod;
            d += `M${x.toFixed(4)},${y.toFixed(4)}h${mod.toFixed(4)}v${mod.toFixed(4)}h-${mod.toFixed(4)}z`;
          }
        }
      }
      s += `<path d="${d}" fill="${fg}" shape-rendering="crispEdges"/>`;
      return s;
    } catch (e) {
      // 失败：绘制占位
      return `<rect x="${xOffset}" y="${yOffset}" width="${sizeMm}" height="${sizeMm}" fill="#f00" opacity="0.3"/>`;
    }
  },

  /** 核心：生成 SVG 字符串 */
  buildSVG(p) {
    const { bodyW, bodyH, totalW, totalH } = this.computeSize(p);
    const svgW = totalW + (p.showRuler ? 12 : 0) + (p.showLabel ? 14 : 0);
    const svgH = totalH + (p.showRuler ? 12 : 0) + (p.showLabel ? 14 : 0);

    // viewBox 单位采用 mm，width/height 显式带 mm 单位确保真实尺寸
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" `
            + `width="${svgW}mm" height="${svgH}mm" `
            + `viewBox="0 0 ${svgW} ${svgH}" `
            + `shape-rendering="crispEdges">`;

    // 背景（仅图案区域）
    svg += `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="${p.bg}"/>`;

    // ==== 图案 ====
    if (p.type === "dots") {
      svg += this.buildDots(p, bodyW, bodyH);
    } else {
      svg += this.buildCheckerboard(p, bodyW, bodyH);
    }

    // 外边框
    if (p.showBorder) {
      svg += `<rect x="0.1" y="0.1" width="${totalW - 0.2}" height="${totalH - 0.2}" `
          + `fill="none" stroke="${p.fg}" stroke-width="0.2"/>`;
    }

    // 尺寸标注
    if (p.showLabel) {
      const txt = p.type === "dots"
        ? `${p.cols}×${p.rows}  Ø${UtilsModule.fmt(p.dotD, 2)}mm  间距${UtilsModule.fmt(p.spacingX, 2)}×${UtilsModule.fmt(p.spacingY, 2)}mm  总: ${UtilsModule.fmt(totalW, 1)}×${UtilsModule.fmt(totalH, 1)}mm`
        : `${p.cols}×${p.rows}  格子${UtilsModule.fmt(p.cellW, 2)}×${UtilsModule.fmt(p.cellH, 2)}mm  总: ${UtilsModule.fmt(totalW, 1)}×${UtilsModule.fmt(totalH, 1)}mm`;
      svg += `<text x="${totalW / 2}" y="${totalH + 5}" text-anchor="middle" `
          + `font-family="Arial, sans-serif" font-size="3" fill="#333">${UtilsModule.escape(txt)}</text>`;
      svg += `<text x="${totalW / 2}" y="${totalH + 9}" text-anchor="middle" `
          + `font-family="Arial, sans-serif" font-size="2.5" fill="#888">${UtilsModule.escape(CONFIG.brand.companyName)} · ${UtilsModule.escape(CONFIG.app.name)} v${CONFIG.app.version}</text>`;
    }

    // 打印校准尺
    if (p.showRuler) {
      svg += this.buildRuler(totalW, totalH, p.showLabel ? 12 : 2);
    }

    svg += `</svg>`;
    return { svg, totalW, totalH, bodyW, bodyH };
  },

  /** 圆点阵列绘制 */
  buildDots(p, bodyW, bodyH) {
    const r = p.dotD / 2;
    let s = "";
    const offsetX = p.marginX;
    const offsetY = p.marginY;

    if (p.dotPattern === "asymmetric") {
      // 非对称：每隔一行偏移半格，且偏移行圆点数量相同
      for (let row = 0; row < p.rows; row++) {
        const offset = (row % 2) * (p.spacingX / 2);
        for (let col = 0; col < p.cols; col++) {
          const cx = offsetX + r + offset + col * p.spacingX;
          const cy = offsetY + r + row * p.spacingY;
          s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${p.fg}"/>`;
        }
      }
    } else if (p.dotPattern === "staggered") {
      for (let row = 0; row < p.rows; row++) {
        const offset = (row % 2) * (p.spacingX / 2);
        for (let col = 0; col < p.cols; col++) {
          const cx = offsetX + r + offset + col * p.spacingX;
          const cy = offsetY + r + row * p.spacingY;
          s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${p.fg}"/>`;
        }
      }
    } else {
      for (let row = 0; row < p.rows; row++) {
        for (let col = 0; col < p.cols; col++) {
          const cx = offsetX + r + col * p.spacingX;
          const cy = offsetY + r + row * p.spacingY;
          s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${p.fg}"/>`;
        }
      }
    }
    return s;
  },

  /** 棋盘格绘制 + 可选二维码 */
  buildCheckerboard(p, bodyW, bodyH) {
    let s = "";
    const ox = p.marginX, oy = p.marginY;

    // 黑格
    for (let r = 0; r < p.rows; r++) {
      for (let c = 0; c < p.cols; c++) {
        if ((r + c) % 2 === 0) {
          const x = ox + c * p.cellW;
          const y = oy + r * p.cellH;
          s += `<rect x="${x}" y="${y}" width="${p.cellW}" height="${p.cellH}" fill="${p.fg}"/>`;
        }
      }
    }

    // 二维码
    if (p.type === "checkerQR" && p.qrEnabled) {
      const positions = this.qrPositions(p);
      const qrPaddingRatio = 0.08; // 8% 留白
      for (const [col, row] of positions) {
        const cellAvailW = p.cellW * p.qrSize;
        const cellAvailH = p.cellH * p.qrSize;
        const side = Math.min(cellAvailW, cellAvailH);
        const pad  = side * qrPaddingRatio;
        const qrSideMm = side - pad * 2;
        const x0 = ox + col * p.cellW + (cellAvailW - qrSideMm) / 2;
        const y0 = oy + row * p.cellH + (cellAvailH - qrSideMm) / 2;

        // 覆盖白底（盖住原棋盘格内容）
        s += `<rect x="${ox + col * p.cellW}" y="${oy + row * p.cellH}" `
           + `width="${cellAvailW}" height="${cellAvailH}" fill="${p.bg}"/>`;

        // 二维码内容
        const content = this.qrContent(col, row, p);
        s += this.qrSvg(content, qrSideMm, p.qrEc, p.fg, p.bg, x0, y0);

        // 坐标文字
        if (p.qrShowCoord) {
          const label = `(${col},${row})`;
          s += `<text x="${x0 + qrSideMm / 2}" y="${y0 + qrSideMm + 2.2}" `
             + `text-anchor="middle" font-family="Arial" font-size="2" fill="#444">${label}</text>`;
        }
      }
    }
    return s;
  },

  /** 打印校准尺（10mm 与 1mm 刻度）*/
  buildRuler(totalW, totalH, yOffset) {
    const y = totalH + yOffset - 8;
    let s = `<g font-family="Arial" font-size="2" fill="#333">`;
    // 底线
    s += `<line x1="0" y1="${y}" x2="100" y2="${y}" stroke="#333" stroke-width="0.2"/>`;
    for (let i = 0; i <= 100; i++) {
      let h;
      if (i % 10 === 0) h = 3;
      else if (i % 5 === 0) h = 2;
      else h = 1;
      s += `<line x1="${i}" y1="${y}" x2="${i}" y2="${y - h}" stroke="#333" stroke-width="0.15"/>`;
      if (i % 10 === 0) {
        s += `<text x="${i}" y="${y - 4}" text-anchor="middle">${i}</text>`;
      }
    }
    s += `<text x="52" y="${y + 3}" fill="#888" font-size="1.8">100mm 校准尺 · 打印后请使用标尺测量验证</text>`;
    s += `</g>`;
    return s;
  },

  /** 主入口：生成并渲染 */
  generate() {
    const params = this.collectParams();
    const err = this.validate(params);
    if (err) {
      UIModule.toast(err, "error");
      return;
    }

    try {
      const { svg, totalW, totalH, bodyW, bodyH } = this.buildSVG(params);
      UIModule.cache.svgWrapper.innerHTML = svg;

      // 纸张适配判断
      const paper = this.resolvePaper(params, totalW, totalH);
      const fit = this.fitStatus(totalW, totalH, paper.w, paper.h);
      const paperLabel = params.paperName === "custom"
        ? `自定义 ${paper.w}×${paper.h}`
        : `${params.paperName} ${paper.orient === "landscape" ? "横向" : "纵向"}`;

      UIModule.updateInfo({ bodyW, bodyH, totalW, totalH, paperLabel, fitStatus: fit });

      // 缓存参数用于导出
      UIModule.state.lastParams = { params, svgW: totalW, svgH: totalH, paper };

      // 保存到 localStorage
      UtilsModule.storageSet("calib_last_config", this.serialize(params));
    } catch (e) {
      console.error(e);
      UIModule.toast("生成失败：" + (e.message || e), "error");
    }
  },

  serialize(p) {
    return {
      type: p.type, unit: p.unit, cols: p.cols, rows: p.rows,
      cellW: p.cellW, cellH: p.cellH,
      dotD: p.dotD, spacingX: p.spacingX, spacingY: p.spacingY,
      dotPattern: p.dotPattern,
      marginX: p.marginX, marginY: p.marginY,
      fg: p.fg, bg: p.bg,
      showBorder: p.showBorder, showRuler: p.showRuler, showLabel: p.showLabel,
      qrEnabled: p.qrEnabled, qrLayout: p.qrLayout,
      qrInterval: p.qrInterval, qrSize: p.qrSize,
      qrFormat: p.qrFormat, qrEc: p.qrEc, qrShowCoord: p.qrShowCoord,
      paperName: p.paperName, orientation: p.orientation
    };
  },

  /** ========== 导出 ========== */
  getSvgString() {
    const wrap = UIModule.cache.svgWrapper;
    const svgEl = wrap.querySelector("svg");
    if (!svgEl) return null;
    return new XMLSerializer().serializeToString(svgEl);
  },

  buildFilename(ext) {
    const p = UIModule.state.lastParams?.params;
    if (!p) return "calibration." + ext;
    if (p.type === "dots") {
      return `calibration_dots_${p.cols}x${p.rows}_d${UtilsModule.fmt(p.dotD, 1)}_s${UtilsModule.fmt(p.spacingX, 1)}mm.${ext}`;
    }
    if (p.type === "checkerQR") {
      return `calibration_checker_qr_${p.cols}x${p.rows}_${UtilsModule.fmt(p.cellW, 1)}mm.${ext}`;
    }
    return `calibration_checker_${p.cols}x${p.rows}_${UtilsModule.fmt(p.cellW, 1)}mm.${ext}`;
  },

  exportSVG() {
    const svgStr = this.getSvgString();
    if (!svgStr) return UIModule.toast("暂无可导出的图像", "error");
    const blob = new Blob([`<?xml version="1.0" encoding="UTF-8"?>\n` + svgStr], { type: "image/svg+xml" });
    UtilsModule.downloadBlob(blob, this.buildFilename("svg"));
    UIModule.toast("SVG 已导出", "success");
  },

  exportPNG() {
    const svgStr = this.getSvgString();
    if (!svgStr) return UIModule.toast("暂无可导出的图像", "error");
    const { svgW, svgH } = UIModule.state.lastParams
      ? { svgW: UIModule.state.lastParams.svgW, svgH: UIModule.state.lastParams.svgH }
      : { svgW: 200, svgH: 200 };
    const dpi = 300;
    const widthPx  = Math.round(svgW * dpi / 25.4);
    const heightPx = Math.round(svgH * dpi / 25.4);

    const img = new Image();
    const blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      try {
        const canvas = document.createElement("canvas");
        canvas.width = widthPx; canvas.height = heightPx;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, widthPx, heightPx);
        canvas.toBlob(b => {
          if (!b) return UIModule.toast("PNG 生成失败", "error");
          UtilsModule.downloadBlob(b, this.buildFilename("png"));
          UIModule.toast("PNG 已导出 (300 DPI)", "success");
        }, "image/png");
      } catch (e) {
        UIModule.toast("PNG 导出失败：" + e.message, "error");
      } finally {
        URL.revokeObjectURL(url);
      }
    };
    img.onerror = () => { URL.revokeObjectURL(url); UIModule.toast("PNG 导出失败", "error"); };
    img.src = url;
  },

  /** PDF 导出：使用 window.print + 打印样式实现 1:1 尺寸 */
  exportPDF() {
    const svgStr = this.getSvgString();
    if (!svgStr) return UIModule.toast("暂无可导出的图像", "error");
    const last = UIModule.state.lastParams;
    if (!last) return;

    // 写入专用打印区域（mm 单位）
    const pa = UIModule.cache.printArea;
    pa.innerHTML = `
      <div style="width:${last.paper.w}mm; height:${last.paper.h}mm; display:flex; align-items:center; justify-content:center; page-break-after:avoid;">
        ${svgStr}
      </div>
    `;
    pa.style.display = "block";

    // 设置 @page 大小
    const existing = document.getElementById("dynamicPageStyle");
    if (existing) existing.remove();
    const style = document.createElement("style");
    style.id = "dynamicPageStyle";
    style.textContent = `
      @media print {
        @page { size: ${last.paper.w}mm ${last.paper.h}mm; margin: 0; }
        html, body { width: ${last.paper.w}mm; height: ${last.paper.h}mm; }
      }
    `;
    document.head.appendChild(style);

    UIModule.toast("打印对话框已打开：请选择“另存为 PDF”，并关闭自动缩放", "info", 4200);

    setTimeout(() => {
      window.print();
      // 打印完成后恢复
      setTimeout(() => { pa.style.display = "none"; pa.innerHTML = ""; }, 500);
    }, 200);
  },

  exportConfigJSON() {
    const p = UIModule.state.lastParams?.params;
    if (!p) return UIModule.toast("暂无可导出的配置", "error");
    const data = this.serialize(p);
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    UtilsModule.downloadBlob(blob, "calibration_config.json");
    UIModule.toast("配置已导出", "success");
  },

  importConfigJSON(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        this.applyConfig(data);
        UIModule.toast("配置已导入", "success");
      } catch (err) {
        UIModule.toast("导入失败：JSON 格式错误", "error");
      }
    };
    reader.onerror = () => UIModule.toast("文件读取失败", "error");
    reader.readAsText(file);
    UIModule.cache.fileInput.value = "";
  },

  applyConfig(d) {
    const c = UIModule.cache;
    const set = (el, v) => { if (v != null) el.value = v; };
    const setCk = (el, v) => { if (v != null) el.checked = !!v; };

    // 切换类型
    if (d.type) {
      c.tabGroup.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.type === d.type);
      });
      UIModule.state.type = d.type;
    }
    // 注意：导入时单位为 mm 基准，直接以 mm 填值并切到 mm
    set(c.inpUnit, "mm");
    set(c.inpCols, d.cols); set(c.inpRows, d.rows);
    set(c.inpCellW, d.cellW); set(c.inpCellH, d.cellH);
    set(c.inpDotD, d.dotD);
    set(c.inpSpacingX, d.spacingX); set(c.inpSpacingY, d.spacingY);
    set(c.inpDotPattern, d.dotPattern);
    set(c.inpMarginX, d.marginX); set(c.inpMarginY, d.marginY);
    set(c.inpFg, d.fg); set(c.inpBg, d.bg);
    setCk(c.inpShowBorder, d.showBorder);
    setCk(c.inpShowRuler, d.showRuler);
    setCk(c.inpShowLabel, d.showLabel);
    setCk(c.inpQrEnabled, d.qrEnabled);
    set(c.inpQrLayout, d.qrLayout);
    set(c.inpQrInterval, d.qrInterval);
    set(c.inpQrSize, d.qrSize);
    set(c.inpQrFormat, d.qrFormat);
    set(c.inpQrEc, d.qrEc);
    setCk(c.inpQrShowCoord, d.qrShowCoord);
    set(c.inpPaper, d.paperName);
    set(c.inpOrientation, d.orientation);
    c.groupCustomPaper.style.display = (d.paperName === "custom") ? "" : "none";

    UIModule.syncTypeGroups();
    CoreModule.generate();
  }
};

/**
 * App: 应用初始化入口
 */
const App = {
  init() {
    try {
      BrandModule.render();
      UIModule.cacheDom();
      UIModule.bind();

      // 恢复上次配置
      const last = UtilsModule.storageGet("calib_last_config", null);
      if (last) {
        try { CoreModule.applyConfig(last); }
        catch (e) { CoreModule.generate(); }
      } else {
        CoreModule.generate();
      }

      // 监听窗口改变，重新适配
      window.addEventListener("resize", UtilsModule.debounce(() => {
        // 缩放保持不变
      }, 200));

      // 全局错误捕获
      window.addEventListener("error", (e) => {
        console.error(e);
      });
    } catch (e) {
      console.error(e);
      alert("初始化失败：" + (e.message || e));
    }
  }
};

document.addEventListener("DOMContentLoaded", App.init);
</script>
